name: code

on:
  push:

jobs:
  microscope:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        understanding: ["harsh", "crisis", "reform", "tender", "prospect"]
        deepen: ["carriage", "piece", "butcher", "advanced"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Wh.jar
